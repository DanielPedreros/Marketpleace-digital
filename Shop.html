<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos — PANDEA</title>
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .shop-hero {
            background: linear-gradient(135deg, #e6e9f8 0%, #d4d9f5 100%);
            padding: 50px 80px 30px;
            text-align: center;
        }
        .shop-hero h1 { font-size: 36px; color: #1a1a2e; margin-bottom: 8px; }
        .shop-hero p { font-size: 16px; color: #555; margin: 0; }

        .filter-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 20px 80px;
            flex-wrap: wrap;
            background: #fff;
            border-bottom: 1px solid #eee;
        }
        .filter-bar span { font-size: 14px; font-weight: 600; color: #333; }
        .filter-btn {
            padding: 7px 18px;
            border: 1px solid #ccc;
            border-radius: 30px;
            background: #fff;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }
        .filter-btn:hover, .filter-btn.active {
            background: #3c52e3;
            color: #fff;
            border-color: #3c52e3;
        }
        @media (max-width: 768px) {
            .shop-hero { padding: 30px 20px 20px; }
            .filter-bar { padding: 15px 20px; }
        }
    </style>
</head>
<body>

    <section id="header">
        <a href="index.html"><img src="/img/logo2.png" class="logo" alt="Logo Pandea"></a>
        <div id="mobile-menu-toggle"><i class="fas fa-bars"></i></div>
        <ul id="navbar">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="Shop.html">Productos</a></li>
            <li><a href="Blog.html">Categorias</a></li>
            <li><a href="About.html">Acerca De</a></li>
        </ul>
        <div class="nav-icons">
            <form class="search-bar">
                <input type="text" id="search-input" placeholder="Buscar..." />
                <button type="submit"><i class="fas fa-search"></i></button>
            </form>
            <a href="#" class="cart-link">
                <i class="bi bi-bag-heart"></i>
                <span id="cart-count">0</span>
            </a>
            <button class="button-login" onclick="window.location.href='Formulario/Login.html'">Login</button>
        </div>
    </section>

    <div class="shop-hero">
        <h1>Todos los productos</h1>
        <p>Encuentra tu estilo en nuestra colección completa</p>
    </div>

    <div class="filter-bar">
        <span>Filtrar:</span>
        <button class="filter-btn active" data-filter="all">Todos</button>
        <button class="filter-btn" data-filter="camisa">Camisas</button>
        <button class="filter-btn" data-filter="pantalon">Pantalones</button>
        <button class="filter-btn" data-filter="blusa">Blusas</button>
        <button class="filter-btn" data-filter="sueter">Suéteres</button>
    </div>

    <section id="producto1" class="section-p1">
        <div class="pro-container" id="shop-grid">
            <!-- Productos generados por JS -->
        </div>
    </section>

    <!-- PANEL CARRITO -->
    <div id="cart-sidebar">
        <div class="cart-header">
            <h3>Carrito</h3>
            <button id="close-cart">&times;</button>
        </div>
        <div id="cart-items"></div>
        <div class="cart-footer">
            <div class="cart-total-row">
                <strong>Total:</strong> <span id="cart-total">$0</span>
            </div>
            <button id="checkout-btn" class="checkout-btn">Proceder al pago →</button>
        </div>
    </div>

    <!-- MODAL -->
    <div id="checkout-modal" class="modal-overlay">
        <div class="modal-box">
            <h3>¡Pedido confirmado!</h3>
            <p>Gracias por tu compra en <strong>Pandea</strong>. Recibirás un correo con los detalles.</p>
            <div id="modal-summary"></div>
            <button id="modal-close-btn" class="modal-close-btn">Cerrar</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Renderizar todos los productos en Shop
        const grid = document.getElementById("shop-grid");
        const categories = {
            1:"camisa",2:"camisa",3:"camisa",4:"camisa",5:"sueter",
            6:"pantalon",7:"blusa",8:"camisa",9:"camisa",10:"camisa",11:"camisa",12:"camisa"
        };

        function renderShop(filter) {
            grid.innerHTML = "";
            products.forEach(p => {
                const cat = categories[p.id] || "camisa";
                if (filter !== "all" && cat !== filter) return;
                const stars = `<i class="fas fa-star"></i>`.repeat(4) + `<i class="fas fa-star-half-alt"></i>`;
                grid.innerHTML += `
                <div class="pro" data-cat="${cat}">
                    <img src="${p.img}" alt="${p.name}" loading="lazy">
                    <div class="des">
                        <span>Pandea</span>
                        <h5>${p.name}</h5>
                        <div class="star">${stars}</div>
                        <h4>$${p.price.toLocaleString()}</h4>
                    </div>
                    <a href="#">
                        <i class="bi bi-cart3 cart-icon add-to-cart" data-id="${p.id}"></i>
                    </a>
                </div>`;
            });
            // Reasignar eventos
            document.querySelectorAll(".add-to-cart").forEach(btn => {
                btn.addEventListener("click", e => {
                    e.preventDefault();
                    const product = products.find(p => p.id === parseInt(btn.getAttribute("data-id")));
                    if (product) addToCart(product);
                });
            });
        }

        renderShop("all");

        // Filtros
        document.querySelectorAll(".filter-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                renderShop(btn.getAttribute("data-filter"));
            });
        });

        // Búsqueda
        document.getElementById("search-input").addEventListener("input", function() {
            const q = this.value.toLowerCase();
            document.querySelectorAll("#shop-grid .pro").forEach(card => {
                const name = card.querySelector("h5").textContent.toLowerCase();
                card.style.display = name.includes(q) ? "" : "none";
            });
        });

        // Menú móvil
        const toggle = document.getElementById("mobile-menu-toggle");
        const navbar = document.getElementById("navbar");
        toggle.addEventListener("click", () => navbar.classList.toggle("show"));
        navbar.querySelectorAll("a").forEach(a => a.addEventListener("click", () => navbar.classList.remove("show")));
    </script>
</body>
</html>
